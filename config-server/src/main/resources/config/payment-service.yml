server:
  port: 8084

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_PAYMENTS_HOST:localhost}:${POSTGRES_PAYMENTS_PORT:5435}/payments_db
    username: ${POSTGRES_PAYMENTS_USER:gurucool}
    password: ${POSTGRES_PAYMENTS_PASSWORD:gurucool_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  cache:
    type: redis

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:razorpay_secret_placeholder}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:webhook_secret_placeholder}
