server:
  port: 8082

spring:
  application:
    name: mentor-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_MENTORS_HOST:localhost}:${POSTGRES_MENTORS_PORT:5433}/mentors_db
    username: ${POSTGRES_MENTORS_USER:gurucool}
    password: ${POSTGRES_MENTORS_PASSWORD:gurucool_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  cache:
    type: redis
    redis:
      time-to-live: 600000

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:gurucool_minio}
  secret-key: ${MINIO_SECRET_KEY:gurucool_minio_secret}
  bucket:
    mentor-documents: mentor-documents
