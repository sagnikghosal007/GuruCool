<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 10px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 40px; text-align: center; color: white; }
        .body { padding: 40px; }
        .stars { font-size: 36px; text-align: center; margin: 20px 0; }
        .btn { display: inline-block; background: #6366f1; color: white; padding: 14px 28px; border-radius: 6px; text-decoration: none; font-weight: bold; }
        .footer { background: #f8f8f8; padding: 20px; text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>How was your session? ⭐</h1>
    </div>
    <div class="body">
        <h2>Hi there!</h2>
        <p>Your GuruCool session has completed. We'd love to know how it went!</p>
        <div class="stars">⭐⭐⭐⭐⭐</div>
        <p>Your feedback helps other students find the best mentors on our platform.</p>
        <center>
            <a href="#" class="btn">Rate Your Mentor</a>
        </center>
        <p style="color: #999; font-size: 13px; margin-top: 20px;">Rating window closes in 7 days.</p>
    </div>
    <div class="footer">
        <p>© 2025 GuruCool. All rights reserved.</p>
    </div>
</div>
</body>
</html>
