<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 10px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #10b981, #059669); padding: 40px; text-align: center; color: white; }
        .body { padding: 40px; }
        .info-box { background: #ecfdf5; border-left: 4px solid #10b981; padding: 20px; border-radius: 4px; margin: 20px 0; }
        .footer { background: #f8f8f8; padding: 20px; text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎉 Booking Confirmed!</h1>
    </div>
    <div class="body">
        <h2>Hi <span th:text="${studentName}">Student</span>!</h2>
        <p>Your session has been successfully booked.</p>
        <div class="info-box">
            <p><strong>Session:</strong> <span th:text="${sessionTitle}">Session Title</span></p>
            <p><strong>Mentor:</strong> <span th:text="${mentorName}">Mentor</span></p>
            <p><strong>Scheduled:</strong> <span th:text="${scheduledAt}">Date &amp; Time</span></p>
            <p th:if="${isPaid}"><strong>Amount Paid:</strong> ₹<span th:text="${amount}">0</span></p>
        </div>
        <p>You'll receive a meeting link before the session starts. Be prepared and good luck! 🚀</p>
    </div>
    <div class="footer">
        <p>© 2025 GuruCool. All rights reserved.</p>
    </div>
</div>
</body>
</html>
