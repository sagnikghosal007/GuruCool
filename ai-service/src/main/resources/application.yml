server:
  port: 8086

spring:
  application:
    name: ai-service
  config:
    import: "optional:configserver:http://localhost:8888"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:gurucool_redis_secret}

# To enable real OpenAI, uncomment and set OPENAI_API_KEY env var,
# then add spring-ai-openai-spring-boot-starter to pom.xml
# spring:
#   ai:
#     openai:
#       api-key: ${OPENAI_API_KEY:demo-key}
#       chat.options.model: gpt-4o-mini

ai:
  openai:
    api-key: ${OPENAI_API_KEY:demo-key}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.gurucool: DEBUG
